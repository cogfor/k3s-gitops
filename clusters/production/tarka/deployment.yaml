---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tarka
  namespace: tarka
  labels:
    app: tarka
    owner: platform
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tarka
  template:
    metadata:
      labels:
        app: tarka
        owner: platform
      annotations:
        linkerd.io/inject: disabled
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 15
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: tarka
      imagePullSecrets:
        - name: ghcr-tarka-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: sync-shared-assets
          image: ghcr.io/oras-project/oras:v1.3.2@sha256:46c55ba0eac848ade573594ef23fa5b1784227f151dab6eac38de2afd0b9c382
          command:
            - /bin/sh
            - /opt/tarka/bin/sync-assets.sh
          env:
            - name: ASSET_REPOSITORY
              value: ghcr.io/cogfor/nicholson31tarka.com-assets
            - name: ASSET_TAG
              value: sha-d96d2e1fa9405a11c063d95e68ad355ad942ea46
            - name: ASSET_ROOT
              value: /shared-assets
            - name: DOCKER_CONFIG
              value: /registry-auth
            - name: HOME
              value: /tmp/oras-home
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: shared-assets
              mountPath: /shared-assets
            - name: tmp
              mountPath: /tmp
            - name: registry-auth
              mountPath: /registry-auth
              readOnly: true
            - name: asset-sync-script
              mountPath: /opt/tarka/bin/sync-assets.sh
              subPath: sync-assets.sh
              readOnly: true
      containers:
        - name: tarka
          image: ghcr.io/cogfor/nicholson31tarka.com:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          resources:
            requests:
              cpu: 20m
              memory: 24Mi
            limits:
              cpu: 200m
              memory: 96Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: shared-assets
              mountPath: /srv/tarka-assets
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: shared-assets
          persistentVolumeClaim:
            claimName: tarka-shared-assets
        - name: registry-auth
          secret:
            secretName: ghcr-tarka-pull
            items:
              - key: .dockerconfigjson
                path: config.json
        - name: asset-sync-script
          configMap:
            name: tarka-asset-sync
            defaultMode: 0555
---
apiVersion: v1
kind: Service
metadata:
  name: tarka
  namespace: tarka
  labels:
    app: tarka
    owner: platform
spec:
  selector:
    app: tarka
  ports:
    - name: http
      port: 8080
      targetPort: http
