---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tarka
  namespace: tarka
  labels:
    app: tarka
    owner: platform
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tarka
  template:
    metadata:
      labels:
        app: tarka
        owner: platform
      annotations:
        linkerd.io/inject: disabled
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-tarka-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tarka
          image: ghcr.io/cogfor/nicholson31tarka.com:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          resources:
            requests:
              cpu: 20m
              memory: 24Mi
            limits:
              cpu: 200m
              memory: 96Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tarka
  namespace: tarka
  labels:
    app: tarka
    owner: platform
spec:
  selector:
    app: tarka
  ports:
    - name: http
      port: 8080
      targetPort: http
