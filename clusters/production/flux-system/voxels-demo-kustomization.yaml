---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: voxels-demo
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/production/voxels-demo
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: cert-manager
    - name: traefik
    - name: network-policies
  decryption:
    provider: sops
    secretRef:
      name: sops-age

